version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: markdown-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8081}:8081"
    environment:
      # 数据库配置（使用外部数据库）
      SPRING_DATASOURCE_URL: jdbc:mysql://${DB_HOST:-39.107.242.71}:${DB_PORT:-3346}/${DB_NAME:-markdown_editor}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-root}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-123456}
      # JWT 配置
      JWT_SECRET: ${JWT_SECRET:-markdown-editor-secret-key-2024}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      # 文件上传目录
      FILE_UPLOAD_DIR: ${FILE_UPLOAD_DIR:-/app/uploads}
      # 时区配置
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      # 上传文件持久化
      - uploads:/app/uploads
    networks:
      - markdown-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: markdown-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - markdown-network
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

# 持久化数据卷
volumes:
  uploads:
    driver: local

# 网络配置
networks:
  markdown-network:
    driver: bridge
